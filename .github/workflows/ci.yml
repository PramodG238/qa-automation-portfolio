name: QA Automation Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST
  workflow_dispatch:

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Install Java (Required for Allure)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -L -o allure.zip https://github.com/allure-framework/allure2/releases/latest/download/allure-2.29.0.zip
          unzip allure.zip
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Run Robot Framework tests
        run: |
          python -m robot \
          --variable BROWSER:headlesschrome \
          --listener allure_robotframework \
          --outputdir results tests/

      - name: Generate Allure Report
        run: |
          allure generate results --clean -o allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Upload Robot Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results
          path: results/
