name: QA Automation Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 3 * * *"   # Runs daily at 9:00 AM IST
  workflow_dispatch:

jobs:
  robot-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest

      # ✅ Run Robot Framework tests with Allure listener
      - name: Run Robot Framework tests
        run: |
          python -m robot \
          --variable BROWSER:headlesschrome \
          --listener allure_robotframework \
          --outputdir results tests/

      # ✅ Generate Allure Report (no manual install needed)
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1
        if: always()
        with:
          allure_results: results
          allure_report: allure-report

      # ✅ Upload Allure Report
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      # (Optional) Keep raw Robot results
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results
          path: results/
